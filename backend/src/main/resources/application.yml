spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/naamevent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:3000}
  jwt-secret: ${JWT_SECRET:bmFhbWV2ZW50LWRldmVsb3BtZW50LXNlY3JldC1tdXN0LWJlLWxvbmdlbm91Z2g=}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}

supabase:
  url: ${SUPABASE_URL:https://your-project.supabase.co}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:replace-me}
  storage-bucket: ${SUPABASE_STORAGE_BUCKET:naameventgudiyattam}
