spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/naamevent}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

app:
  cors-origin: ${CORS_ORIGIN:http://localhost:3000}
  jwt-secret: ${JWT_SECRET:bmFhbWV2ZW50LWRldmVsb3BtZW50LXNlY3JldC1tdXN0LWJlLWxvbmdlbm91Z2g=}

admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  hostport: ${MINIO_HOSTPORT:}
  secure: ${MINIO_SECURE:false}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:admin123}
  bucket-name: ${MINIO_BUCKET_NAME:naameventgudiyattam}
